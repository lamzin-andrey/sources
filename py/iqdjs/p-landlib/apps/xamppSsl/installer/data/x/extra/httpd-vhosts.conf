NameVirtualHost *:80
<VirtualHost *:80>
	ServerAdmin webmaster@localhost
	ServerName localhost
	DocumentRoot "/opt/lampp/htdocs/localhost/www"
	ScriptAlias /cgi/ "/opt/lampp/htdocs/localhost/cgi/
	ErrorLog /opt/lampp/htdocs/localhost/error.log
	CustomLog /opt/lampp/htdocs/localhost/access.log common
</VirtualHost>
